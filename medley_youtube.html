<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medley Studio (YouTube)</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161a22;
    --panel-2: #1d2330;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f78166;
    --accent-2: #58a6ff;
    --good: #3fb950;
    --danger: #f85149;
    --border: #30363d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.4;
  }
  header {
    position: sticky; top: 0;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    z-index: 10;
  }
  h1 { font-size: 18px; margin: 0; font-weight: 600; }
  h2 { font-size: 14px; margin: 0 0 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .muted { color: var(--muted); }
  .row { display: flex; gap: 8px; align-items: center; }
  button, label.btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background 0.1s, border-color 0.1s;
  }
  button:hover, label.btn:hover { background: #262d3b; border-color: #4a5060; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0e1116; font-weight: 600; }
  button.primary:hover { background: #ff9478; }
  button.danger { color: var(--danger); }
  button.ghost { background: transparent; }
  input[type=file] { display: none; }
  .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
  .layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  .yt-panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 14px; overflow: hidden;
  }
  .yt-body { padding: 14px; }
  .yt-body textarea {
    width: 100%; resize: vertical; min-height: 70px;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
  }
  .yt-body textarea:focus { outline: 1px solid var(--accent); }

  .clips { display: flex; flex-direction: column; gap: 12px; }
  .clip-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .clip-card.active { border-color: var(--accent); }
  .clip-header {
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
  }
  .clip-title { font-weight: 500; font-size: 13px; flex: 1; min-width: 0; word-break: break-word; }
  .clip-body { padding: 12px 14px; }
  .yt-frame-wrap {
    position: relative; width: 100%; padding-bottom: 56.25%; /* 16:9 */
    background: #000; border-radius: 4px; overflow: hidden;
  }
  .yt-frame-wrap iframe,
  .yt-frame-wrap > div {
    position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
  }
  .clip-controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 10px; }
  .ts-input {
    background: var(--bg); color: var(--accent-2);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 8px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px; width: 90px;
  }
  .ts-input:focus { outline: 1px solid var(--accent); }
  .ts-input.invalid { border-color: var(--danger); color: var(--danger); }
  .ctrl-group {
    display: flex; align-items: center; gap: 4px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px;
  }
  .ctrl-group button { border: none; background: transparent; padding: 4px 8px; }
  .ctrl-group button:hover { background: var(--panel-2); }
  .pair-label { font-size: 11px; color: var(--muted); font-weight: 600; min-width: 28px; text-align: right; }

  .timeline-panel {
    position: sticky; top: 70px; align-self: start;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; max-height: calc(100vh - 100px); overflow-y: auto;
  }
  .timeline-stats { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .preview {
    background: #000; border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden; margin-bottom: 12px;
  }
  .preview .yt-frame-wrap { border-radius: 0; }
  .preview-bar { display: flex; align-items: center; gap: 6px; padding: 6px 8px; background: var(--panel-2); }
  .preview-bar button { padding: 4px 10px; font-size: 13px; }
  .preview-bar button.primary { padding: 4px 14px; }
  #pv-status { font-size: 11px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .clip-row.playing { border-color: var(--accent); background: rgba(247,129,102,0.08); }
  .clip-row .badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 22px; padding: 0 6px; border-radius: 11px;
    background: var(--accent-2); color: #0e1116; font-weight: 700; font-size: 11px;
    font-family: ui-monospace, monospace;
  }
  .clip-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px; margin-bottom: 6px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px;
    cursor: grab;
  }
  .clip-row.dragging { opacity: 0.4; }
  .clip-row.drag-over { border-color: var(--accent); }
  .clip-row .grip { color: var(--muted); cursor: grab; user-select: none; }
  .clip-row .info { flex: 1; min-width: 0; }
  .clip-row .name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clip-row .span { font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; }
  .empty { color: var(--muted); text-align: center; padding: 24px 8px; font-style: italic; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .actions button { flex: 1; min-width: 100px; }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; max-width: 700px; width: 90%;
    max-height: 80vh; overflow-y: auto;
  }
  .modal.wide { max-width: 1000px; }
  .json-editor {
    width: 100%; height: 60vh; resize: vertical;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px; line-height: 1.5; white-space: pre; overflow: auto;
    tab-size: 2; -moz-tab-size: 2;
  }
  .json-editor:focus { outline: 1px solid var(--accent); }
  .json-status {
    margin-top: 6px; font-size: 12px; min-height: 18px;
    font-family: ui-monospace, monospace;
    color: var(--muted);
  }
  .json-status[data-ok="ok"] { color: var(--good); }
  .json-status[data-ok="bad"] { color: var(--danger); }
  .modal h3 { margin: 0 0 12px; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--good); color: #0e1116; padding: 10px 16px; border-radius: 6px;
    font-weight: 600; opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .err-banner {
    background: rgba(248,81,73,0.1); color: var(--danger);
    border: 1px solid var(--danger); border-radius: 4px;
    padding: 8px 12px; font-size: 12px; margin-top: 8px;
  }
</style>
</head>
<body>
<header>
  <h1>🎤 Medley Studio</h1>
  <div class="row">
    <span id="status" class="muted">No clips added</span>
    <label class="btn" title="Import a previously-exported medley.json">
      Import medley…
      <input type="file" id="json-picker" accept=".json,application/json">
    </label>
  </div>
</header>
<div class="container">
  <div class="layout">
    <div>
      <div class="yt-panel">
        <div class="yt-body">
          <h2>Add YouTube videos</h2>
          <textarea id="yt-urls" rows="3"
            placeholder="Paste one YouTube URL per line — e.g. https://www.youtube.com/watch?v=…"></textarea>
          <div class="row" style="margin-top:10px; gap:8px;">
            <button id="btn-yt-add" class="primary">+ Add to clips</button>
            <span id="yt-status" class="muted" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
          </div>
        </div>
      </div>
      <h2>Source clips</h2>
      <div id="clips" class="clips">
        <div class="empty">Paste a YouTube URL above to get started.</div>
      </div>
    </div>
    <aside class="timeline-panel">
      <h2>Medley timeline</h2>
      <div id="timeline-stats" class="timeline-stats">No clips yet.</div>
      <div id="preview" class="preview" style="display:none;">
        <div class="yt-frame-wrap"><div id="yt-preview-mount"></div></div>
        <div class="preview-bar">
          <button id="pv-prev" title="Previous clip">⏮</button>
          <button id="pv-back5" class="ghost" title="Back 5s">⏪</button>
          <button id="pv-play" class="primary" title="Play / Pause">▶</button>
          <button id="pv-fwd5" class="ghost" title="Forward 5s">⏩</button>
          <button id="pv-next" title="Next clip">⏭</button>
          <button id="pv-stop" class="ghost" title="Stop">⏹</button>
          <span id="pv-status" class="muted">—</span>
        </div>
      </div>
      <div id="timeline">
        <div class="empty">Mark in/out on a video and add it here.</div>
      </div>
      <div class="actions">
        <button id="btn-preview" class="primary">▶ Preview medley</button>
        <button id="btn-json-edit" class="ghost" title="Edit the cut list as JSON">{ } Edit JSON</button>
        <button id="btn-export" class="ghost">Export medley.json</button>
        <button id="btn-clear" class="danger ghost">Clear all</button>
      </div>
    </aside>
  </div>
</div>
<div id="modal-bg" class="modal-bg">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <p class="muted" id="modal-desc"></p>
    <div id="modal-content"></div>
    <div class="row" style="justify-content: flex-end; margin-top: 12px;">
      <button id="modal-close">Close</button>
    </div>
  </div>
</div>
<div id="toast" class="toast">Copied</div>

<script>
'use strict';

// ---------- YouTube IFrame API loader ----------
let ytApiReady = false;
const ytApiCallbacks = [];
window.onYouTubeIframeAPIReady = function () {
  ytApiReady = true;
  while (ytApiCallbacks.length) ytApiCallbacks.shift()();
};
function whenYtReady(cb) {
  if (ytApiReady) cb();
  else ytApiCallbacks.push(cb);
}
(function () {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

// ---------- helpers ----------
const $ = (sel) => document.querySelector(sel);

const fmt = (sec) => {
  if (sec == null || isNaN(sec)) return '–';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toFixed(2).padStart(5, '0')}`;
};

const parseTime = (raw) => {
  raw = String(raw).trim().replace(/s$/i, '');
  if (!raw) return null;
  const parts = raw.split(':');
  if (parts.length === 1) {
    const v = parseFloat(parts[0]);
    return isFinite(v) ? v : null;
  }
  if (parts.length === 2) {
    const m = parseFloat(parts[0]), s = parseFloat(parts[1]);
    return (isFinite(m) && isFinite(s)) ? m * 60 + s : null;
  }
  if (parts.length === 3) {
    const h = parseFloat(parts[0]), m = parseFloat(parts[1]), s = parseFloat(parts[2]);
    return (isFinite(h) && isFinite(m) && isFinite(s)) ? h * 3600 + m * 60 + s : null;
  }
  return null;
};

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const toast = (msg) => {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1400);
};

// Extract YouTube videoId from many URL shapes (or accept a bare 11-char ID).
function extractVideoId(input) {
  const raw = String(input).trim();
  if (!raw) return null;
  // Bare ID
  if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
  let u;
  try { u = new URL(raw); } catch { return null; }
  const host = u.hostname.replace(/^www\./, '');
  if (host === 'youtu.be') {
    const id = u.pathname.slice(1).split('/')[0];
    return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
  }
  if (host.endsWith('youtube.com') || host.endsWith('youtube-nocookie.com')) {
    if (u.pathname === '/watch') {
      const v = u.searchParams.get('v');
      return v && /^[a-zA-Z0-9_-]{11}$/.test(v) ? v : null;
    }
    const parts = u.pathname.split('/').filter(Boolean);
    const tag = parts[0];
    if (['shorts', 'embed', 'v', 'live'].includes(tag) && parts[1]) {
      const id = parts[1];
      return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
    }
  }
  return null;
}

// ---------- state ----------
const state = {
  clips: [],     // { id, videoId, url, title, duration, player }
  timeline: [],  // { id, sourceId, videoId, title, start, end }
};
let nextId = 1;

const preview = {
  active: false,
  idx: 0,
  player: null,    // YT.Player instance for the preview
  poll: null,      // setInterval id for end-of-clip detection
  ready: false,    // is the preview player constructed and ready?
};

// ---------- adding YouTube clips ----------
$('#btn-yt-add').addEventListener('click', () => {
  const lines = $('#yt-urls').value.split('\n').map(s => s.trim()).filter(Boolean);
  if (!lines.length) { alert('Paste at least one YouTube URL.'); return; }
  let added = 0, skipped = 0, bad = [];
  const existing = new Set(state.clips.map(c => c.videoId));
  for (const line of lines) {
    const id = extractVideoId(line);
    if (!id) { bad.push(line); continue; }
    if (existing.has(id)) { skipped++; continue; }
    existing.add(id);
    state.clips.push({
      id: nextId++,
      videoId: id,
      url: line,
      title: id,           // gets replaced once player reports getVideoData
      duration: null,
      player: null,
    });
    added++;
  }
  $('#yt-urls').value = '';
  setStatus();
  renderClips();
  let msg = `Added ${added}`;
  if (skipped) msg += ` · skipped ${skipped} duplicate${skipped === 1 ? '' : 's'}`;
  if (bad.length) msg += ` · ${bad.length} unrecognised`;
  $('#yt-status').textContent = msg;
  if (added) toast(msg);
  if (bad.length) {
    showModal('Some URLs were not recognised',
      'These didn\'t look like YouTube links — paste a watch URL, a youtu.be URL, a /shorts/ URL, or just the 11-char video ID.',
      `<pre style="background:var(--bg); padding:10px; border-radius:6px; font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; word-break:break-all;">${escapeHtml(bad.join('\n'))}</pre>`);
  }
});

function setStatus() {
  const n = state.clips.length;
  $('#status').textContent = n
    ? `${n} clip${n === 1 ? '' : 's'}`
    : 'No clips added';
}

// ---------- render source clips ----------
function renderClips() {
  const container = $('#clips');
  container.innerHTML = '';
  if (!state.clips.length) {
    container.innerHTML = '<div class="empty">Paste a YouTube URL above to get started.</div>';
    return;
  }
  state.clips.forEach((clip) => {
    const card = document.createElement('div');
    card.className = 'clip-card';
    card.dataset.clipId = clip.id;
    const mountId = 'yt-mount-' + clip.id;
    card.innerHTML = `
      <div class="clip-header">
        <div class="clip-title" data-role="title">${escapeHtml(clip.title)}</div>
        <span class="muted" data-role="dur">–</span>
        <button data-act="remove" class="danger ghost" title="Remove this clip">✕</button>
      </div>
      <div class="clip-body">
        <div class="yt-frame-wrap"><div id="${mountId}"></div></div>
        <div class="clip-controls" style="margin-top:10px;">
          <div class="ctrl-group" title="Skip backward / forward">
            <button data-act="skip" data-skip="-5">⏪ 5s</button>
            <button data-act="skip" data-skip="-1">−1</button>
            <button data-act="skip" data-skip="1">+1</button>
            <button data-act="skip" data-skip="5">5s ⏩</button>
          </div>
        </div>
        <div class="clip-controls" style="margin-top:8px;">
          <span class="pair-label">In</span>
          <button data-act="markin" title="Set to current time">Mark</button>
          <input class="ts-input" data-role="in-input" placeholder="–" inputmode="decimal">
          <button data-act="goin" class="ghost" title="Seek to In">↦</button>
          <span class="pair-label" style="margin-left:8px;">Out</span>
          <button data-act="markout" title="Set to current time">Mark</button>
          <input class="ts-input" data-role="out-input" placeholder="–" inputmode="decimal">
          <button data-act="goout" class="ghost" title="Seek to Out">↦</button>
        </div>
        <div class="clip-controls" style="margin-top:8px;">
          <button data-act="reset" class="ghost">Reset</button>
          <button data-act="add" class="primary">Add to medley ↦</button>
        </div>
      </div>
    `;
    container.appendChild(card);

    const inInput = card.querySelector('[data-role=in-input]');
    const outInput = card.querySelector('[data-role=out-input]');
    const durEl = card.querySelector('[data-role=dur]');
    const titleEl = card.querySelector('[data-role=title]');

    let inT = null, outT = null;
    const refresh = () => {
      if (document.activeElement !== inInput)  inInput.value  = inT  != null ? fmt(inT)  : '';
      if (document.activeElement !== outInput) outInput.value = outT != null ? fmt(outT) : '';
      inInput.classList.remove('invalid');
      outInput.classList.remove('invalid');
    };
    const onInputChange = (which, el) => {
      const raw = el.value.trim();
      if (!raw) { if (which === 'in') inT = null; else outT = null; el.classList.remove('invalid'); return; }
      const t = parseTime(raw);
      const dur = clip.duration || Infinity;
      if (t == null || t < 0 || t > dur) { el.classList.add('invalid'); return; }
      el.classList.remove('invalid');
      if (which === 'in') inT = t; else outT = t;
    };
    inInput.addEventListener('change',  () => onInputChange('in',  inInput));
    outInput.addEventListener('change', () => onInputChange('out', outInput));
    inInput.addEventListener('blur',  () => refresh());
    outInput.addEventListener('blur', () => refresh());

    // Build the YouTube player into the mount div.
    whenYtReady(() => {
      const player = new YT.Player(mountId, {
        videoId: clip.videoId,
        playerVars: { rel: 0, modestbranding: 1, playsinline: 1 },
        events: {
          onReady: (ev) => {
            clip.player = ev.target;
            try {
              const data = ev.target.getVideoData();
              if (data && data.title) {
                clip.title = data.title;
                titleEl.textContent = data.title;
              }
              const d = ev.target.getDuration();
              if (d) { clip.duration = d; durEl.textContent = fmt(d); }
            } catch {}
          },
          onStateChange: (ev) => {
            // Duration sometimes only becomes available on first play.
            if (clip.duration == null) {
              try {
                const d = ev.target.getDuration();
                if (d) { clip.duration = d; durEl.textContent = fmt(d); }
              } catch {}
            }
          },
          onError: (errEv) => {
            // YouTube IFrame API error codes:
            //   2   — invalid videoId
            //   5   — HTML5 player error
            //   100 — video removed or marked private
            //   101, 150 — uploader disabled embedding (classic codes)
            //   153 — "playback on other websites has been disabled by the
            //         video owner" (newer code, same idea as 101/150)
            const code = errEv && errEv.data;
            const reason = (
              code === 2   ? 'The video ID looks invalid.' :
              code === 5   ? 'The HTML5 player hit an error on this video.' :
              code === 100 ? 'This video has been removed or marked private.' :
              (code === 101 || code === 150 || code === 153)
                ? 'The uploader has disabled embedding for this video — it can only be played on YouTube itself.'
                : 'YouTube refused to embed this video.'
            );
            const watchUrl = `https://www.youtube.com/watch?v=${clip.videoId}`;
            // Hide the broken iframe so it doesn't sit there showing YouTube's
            // error chrome on top of ours.
            const wrap = card.querySelector('.yt-frame-wrap');
            if (wrap) wrap.style.display = 'none';
            const errBox = document.createElement('div');
            errBox.className = 'err-banner';
            errBox.innerHTML = `
              <div style="font-weight:600; margin-bottom:6px;">Can’t embed this video${code ? ` (error ${code})` : ''}</div>
              <div style="margin-bottom:8px;">${escapeHtml(reason)}</div>
              <div style="margin-bottom:8px; color:var(--muted); font-size:11px;">
                You can still open it on YouTube to find timestamps, then type In/Out below by hand
                (format: <code>M:SS.sss</code> or seconds). Note: the medley preview will skip this clip too.
              </div>
              <div class="row" style="gap:8px;">
                <a class="btn" href="${watchUrl}" target="_blank" rel="noopener" style="text-decoration:none;">↗ Open on YouTube</a>
                <button data-act="remove" class="danger ghost">✕ Remove this clip</button>
              </div>
            `;
            card.querySelector('.clip-body').prepend(errBox);
          },
        },
      });
    });

    card.addEventListener('click', (ev) => {
      const btn = ev.target.closest('button');
      if (!btn) return;
      const p = clip.player;
      switch (btn.dataset.act) {
        case 'markin':
          if (p) { inT = p.getCurrentTime(); refresh(); }
          break;
        case 'markout':
          if (p) { outT = p.getCurrentTime(); refresh(); }
          break;
        case 'goin':
          if (p && inT != null) p.seekTo(inT, true);
          break;
        case 'goout':
          if (p && outT != null) p.seekTo(outT, true);
          break;
        case 'skip': {
          if (!p) return;
          const delta = parseFloat(btn.dataset.skip || '0');
          const d = clip.duration || Infinity;
          p.seekTo(Math.max(0, Math.min(d, p.getCurrentTime() + delta)), true);
          break;
        }
        case 'reset':
          inT = outT = null; refresh();
          break;
        case 'add':
          if (inT == null && outT == null) {
            if (!clip.duration) {
              alert('Wait until the video has loaded — duration not yet known.');
              return;
            }
            addToTimeline({ sourceId: clip.id, videoId: clip.videoId, title: clip.title, start: 0, end: clip.duration });
          } else if (inT == null || outT == null) {
            alert('Set both In and Out (or reset and use the whole clip).');
          } else if (outT <= inT) {
            alert('Out point must be after In point.');
          } else {
            addToTimeline({ sourceId: clip.id, videoId: clip.videoId, title: clip.title, start: inT, end: outT });
          }
          break;
        case 'remove':
          if (state.timeline.some(t => t.sourceId === clip.id) &&
              !confirm('This clip is used in the timeline. Remove anyway?')) return;
          if (clip.player && clip.player.destroy) try { clip.player.destroy(); } catch {}
          state.clips = state.clips.filter(c => c.id !== clip.id);
          state.timeline = state.timeline.filter(t => t.sourceId !== clip.id);
          setStatus();
          renderClips();
          renderTimeline();
          break;
      }
    });
  });
}

// ---------- timeline ----------
function addToTimeline({ sourceId, videoId, title, start, end }) {
  state.timeline.push({ id: nextId++, sourceId, videoId, title, start, end });
  renderTimeline();
  toast('Added to medley');
}

function renderTimeline() {
  const tl = $('#timeline');
  const stats = $('#timeline-stats');
  if (!state.timeline.length) {
    tl.innerHTML = '<div class="empty">Mark in/out on a video and add it here.</div>';
    stats.textContent = 'No clips yet.';
    return;
  }
  const total = state.timeline.reduce((s, c) => s + (c.end - c.start), 0);
  stats.textContent = `${state.timeline.length} clip${state.timeline.length === 1 ? '' : 's'} · ${fmt(total)} total`;
  tl.innerHTML = '';
  state.timeline.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'clip-row';
    row.draggable = true;
    row.dataset.id = c.id;
    if (preview.active && i === preview.idx) row.classList.add('playing');
    row.innerHTML = `
      <span class="badge">${i + 1}</span>
      <span class="grip" title="Drag to reorder">⋮⋮</span>
      <div class="info">
        <div class="name" title="${escapeHtml(c.title)}">${escapeHtml(c.title)}</div>
        <div class="span">${fmt(c.start)} → ${fmt(c.end)} · ${fmt(c.end - c.start)}</div>
      </div>
      <button data-act="play" class="ghost" title="Preview from this clip">▶</button>
      <button data-act="up" class="ghost" title="Move up">▲</button>
      <button data-act="down" class="ghost" title="Move down">▼</button>
      <button data-act="del" class="danger ghost" title="Remove">✕</button>
    `;
    tl.appendChild(row);
  });

  tl.querySelectorAll('.clip-row').forEach((row) => {
    const id = +row.dataset.id;
    row.addEventListener('click', (ev) => {
      const btn = ev.target.closest('button');
      if (!btn) return;
      const idx = state.timeline.findIndex(x => x.id === id);
      if (btn.dataset.act === 'del') state.timeline.splice(idx, 1);
      if (btn.dataset.act === 'up' && idx > 0) {
        [state.timeline[idx - 1], state.timeline[idx]] = [state.timeline[idx], state.timeline[idx - 1]];
      }
      if (btn.dataset.act === 'down' && idx < state.timeline.length - 1) {
        [state.timeline[idx + 1], state.timeline[idx]] = [state.timeline[idx], state.timeline[idx + 1]];
      }
      if (btn.dataset.act === 'play') { startPreview(idx); return; }
      renderTimeline();
    });
    row.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', String(id));
      row.classList.add('dragging');
    });
    row.addEventListener('dragend', () => row.classList.remove('dragging'));
    row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      row.classList.remove('drag-over');
      const fromId = +e.dataTransfer.getData('text/plain');
      const fromIdx = state.timeline.findIndex(x => x.id === fromId);
      const toIdx = state.timeline.findIndex(x => x.id === id);
      if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;
      const [moved] = state.timeline.splice(fromIdx, 1);
      state.timeline.splice(toIdx, 0, moved);
      renderTimeline();
    });
  });
}

// ---------- medley preview ----------
// One YT player. For each timeline entry we call loadVideoById with start
// and end seconds, then poll currentTime to advance hard-cut to the next
// clip when the end is reached. (loadVideoById's endSeconds *should* pause
// the player at that point, but reality varies — polling is reliable.)
function ensurePreviewPlayer(onReady) {
  if (preview.player && preview.ready) { onReady(); return; }
  whenYtReady(() => {
    if (preview.player) {
      // Already constructed but not ready yet — wait.
      const wait = setInterval(() => {
        if (preview.ready) { clearInterval(wait); onReady(); }
      }, 50);
      return;
    }
    preview.player = new YT.Player('yt-preview-mount', {
      playerVars: { rel: 0, modestbranding: 1, playsinline: 1, controls: 1 },
      events: {
        onReady: () => { preview.ready = true; onReady(); },
        onStateChange: (ev) => {
          // YT.PlayerState: -1 unstarted, 0 ended, 1 playing, 2 paused, 3 buffering, 5 cued
          if (ev.data === YT.PlayerState.ENDED) advancePreview(+1);
          syncPlayIcon();
        },
        onError: () => {
          $('#pv-status').textContent = '(playback error — skipping)';
          setTimeout(() => advancePreview(+1), 600);
        },
      },
    });
  });
}

function startPreview(fromIdx = 0) {
  if (!state.timeline.length) { alert('Add some clips first.'); return; }
  preview.active = true;
  preview.idx = Math.max(0, Math.min(fromIdx, state.timeline.length - 1));
  $('#preview').style.display = 'block';
  $('#btn-preview').textContent = '⏸ Hide preview';
  ensurePreviewPlayer(loadCurrent);
  startPolling();
  renderTimeline();
}

function stopPreview() {
  preview.active = false;
  stopPolling();
  if (preview.player && preview.ready) {
    try { preview.player.stopVideo(); } catch {}
  }
  $('#preview').style.display = 'none';
  $('#btn-preview').textContent = '▶ Preview medley';
  $('#pv-status').textContent = '—';
  renderTimeline();
}

function loadCurrent() {
  const clip = state.timeline[preview.idx];
  if (!clip) { stopPreview(); return; }
  if (!preview.player || !preview.ready) return;
  try {
    preview.player.loadVideoById({
      videoId: clip.videoId,
      startSeconds: clip.start,
      endSeconds: clip.end,
    });
  } catch (e) {
    console.warn('loadVideoById failed', e);
  }
  updatePvStatus();
  renderTimeline();
}

function advancePreview(direction) {
  const next = preview.idx + direction;
  if (next < 0 || next >= state.timeline.length) { stopPreview(); return; }
  preview.idx = next;
  loadCurrent();
}

function startPolling() {
  stopPolling();
  preview.poll = setInterval(() => {
    if (!preview.active || !preview.player || !preview.ready) return;
    const clip = state.timeline[preview.idx];
    if (!clip) return;
    let t;
    try { t = preview.player.getCurrentTime(); } catch { return; }
    if (t >= clip.end - 0.05) advancePreview(+1);
  }, 200);
}

function stopPolling() {
  if (preview.poll) { clearInterval(preview.poll); preview.poll = null; }
}

function updatePvStatus() {
  const clip = state.timeline[preview.idx];
  if (!clip) return;
  $('#pv-status').textContent =
    `Clip ${preview.idx + 1}/${state.timeline.length} · ${clip.title} · ${fmt(clip.start)} → ${fmt(clip.end)}`;
}

function syncPlayIcon() {
  if (!preview.player || !preview.ready) return;
  let s;
  try { s = preview.player.getPlayerState(); } catch { return; }
  $('#pv-play').textContent = (s === YT.PlayerState.PLAYING || s === YT.PlayerState.BUFFERING) ? '⏸' : '▶';
}

$('#btn-preview').addEventListener('click', () => {
  if (preview.active) stopPreview(); else startPreview(0);
});
$('#pv-play').addEventListener('click', () => {
  if (!preview.player || !preview.ready) return;
  const s = preview.player.getPlayerState();
  if (s === YT.PlayerState.PLAYING) preview.player.pauseVideo();
  else preview.player.playVideo();
});
$('#pv-prev').addEventListener('click', () => advancePreview(-1));
$('#pv-next').addEventListener('click', () => advancePreview(+1));
$('#pv-stop').addEventListener('click', () => stopPreview());
$('#pv-back5').addEventListener('click', () => {
  if (!preview.player || !preview.ready) return;
  const t = preview.player.getCurrentTime();
  const clip = state.timeline[preview.idx];
  preview.player.seekTo(Math.max(clip ? clip.start : 0, t - 5), true);
});
$('#pv-fwd5').addEventListener('click', () => {
  if (!preview.player || !preview.ready) return;
  const t = preview.player.getCurrentTime();
  const clip = state.timeline[preview.idx];
  preview.player.seekTo(Math.min(clip ? clip.end : t + 5, t + 5), true);
});

// ---------- export / import ----------
function exportPayload() {
  return {
    output: 'medley.json',
    sources: state.clips.map(c => ({
      videoId: c.videoId,
      url: c.url,
      title: c.title,
    })),
    clips: state.timeline.map(c => ({
      videoId: c.videoId,
      title: c.title,
      start: +c.start.toFixed(3),
      end: +c.end.toFixed(3),
    })),
  };
}

function downloadJson() {
  const blob = new Blob([JSON.stringify(exportPayload(), null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'medley.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

$('#btn-export').addEventListener('click', () => {
  if (!state.timeline.length) { alert('Timeline is empty.'); return; }
  downloadJson();
  toast('Downloaded medley.json');
});

$('#json-picker').addEventListener('change', async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  try {
    const data = JSON.parse(await f.text());
    if (!Array.isArray(data.clips)) throw new Error('No "clips" array.');

    // Restore source clips from `sources` first (so the timeline has players
    // to point at).
    const have = new Set(state.clips.map(c => c.videoId));
    if (Array.isArray(data.sources)) {
      for (const src of data.sources) {
        const id = src.videoId || extractVideoId(src.url || '');
        if (!id || have.has(id)) continue;
        have.add(id);
        state.clips.push({
          id: nextId++, videoId: id,
          url: src.url || `https://www.youtube.com/watch?v=${id}`,
          title: src.title || id,
          duration: null, player: null,
        });
      }
    }

    // Map videoIds to source clip ids.
    const idByVideo = new Map(state.clips.map(c => [c.videoId, c.id]));

    state.timeline = data.clips.map(c => {
      const id = c.videoId || extractVideoId(c.url || '') || extractVideoId(c.file || '');
      if (!id) return null;
      // Lazily add a source clip if one isn't there yet (e.g. older JSON
      // without `sources`).
      if (!idByVideo.has(id)) {
        const sid = nextId++;
        state.clips.push({
          id: sid, videoId: id,
          url: `https://www.youtube.com/watch?v=${id}`,
          title: c.title || id,
          duration: null, player: null,
        });
        idByVideo.set(id, sid);
      }
      return {
        id: nextId++,
        sourceId: idByVideo.get(id),
        videoId: id,
        title: c.title || id,
        start: Number(c.start) || 0,
        end: Number(c.end) || 0,
      };
    }).filter(c => c && c.end > c.start);

    setStatus();
    renderClips();
    renderTimeline();
    toast(`Loaded ${state.timeline.length} clip${state.timeline.length === 1 ? '' : 's'}`);
  } catch (err) {
    alert('Could not parse that file as medley.json:\n' + err.message);
  }
  e.target.value = '';
});

$('#btn-clear').addEventListener('click', () => {
  if (state.timeline.length && !confirm('Clear the entire timeline?')) return;
  state.timeline = [];
  renderTimeline();
});

// ---------- JSON editor ----------
$('#btn-json-edit').addEventListener('click', () => {
  showJsonEditor(JSON.stringify(exportPayload(), null, 2));
});

function showJsonEditor(initialJson) {
  $('#modal-title').textContent = 'Edit medley JSON';
  $('#modal-desc').textContent = 'Edit the cut list directly. Click Apply to rebuild the timeline.';
  const content = $('#modal-content');
  content.innerHTML = `
    <textarea class="json-editor" id="json-editor-text" spellcheck="false"></textarea>
    <div class="json-status" id="json-editor-status">—</div>
    <div class="row" style="justify-content:flex-end; gap:6px; margin-top:8px;">
      <button id="json-fmt-btn" class="ghost">Format</button>
      <button id="json-revert-btn" class="ghost">Revert</button>
      <button id="json-apply-btn" class="primary">Apply changes</button>
    </div>
  `;
  const ta = content.querySelector('#json-editor-text');
  const status = content.querySelector('#json-editor-status');
  ta.value = initialJson;

  const validate = () => {
    let data;
    try { data = JSON.parse(ta.value); }
    catch (e) { status.textContent = '✗ ' + e.message; status.dataset.ok = 'bad'; return null; }
    if (!data || typeof data !== 'object') { status.textContent = '✗ Top-level must be an object.'; status.dataset.ok = 'bad'; return null; }
    if (!Array.isArray(data.clips)) { status.textContent = '✗ Missing "clips" array.'; status.dataset.ok = 'bad'; return null; }
    for (let i = 0; i < data.clips.length; i++) {
      const c = data.clips[i];
      if (!c || typeof c !== 'object') { status.textContent = `✗ Clip ${i + 1} not an object.`; status.dataset.ok = 'bad'; return null; }
      if (!c.videoId && !c.url && !c.file) { status.textContent = `✗ Clip ${i + 1} needs videoId or url.`; status.dataset.ok = 'bad'; return null; }
      if (typeof c.start !== 'number' || typeof c.end !== 'number') { status.textContent = `✗ Clip ${i + 1} needs numeric start/end.`; status.dataset.ok = 'bad'; return null; }
      if (c.end <= c.start) { status.textContent = `✗ Clip ${i + 1}: end must be > start.`; status.dataset.ok = 'bad'; return null; }
    }
    const total = data.clips.reduce((s, c) => s + (c.end - c.start), 0);
    status.textContent = `✓ ${data.clips.length} clip${data.clips.length === 1 ? '' : 's'} · ${fmt(total)} total`;
    status.dataset.ok = 'ok';
    return data;
  };

  ta.addEventListener('input', validate);
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Tab' && !e.shiftKey) {
      e.preventDefault();
      const s = ta.selectionStart, eend = ta.selectionEnd;
      ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(eend);
      ta.selectionStart = ta.selectionEnd = s + 2;
      validate();
    } else if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      content.querySelector('#json-apply-btn').click();
    }
  });

  content.querySelector('#json-fmt-btn').addEventListener('click', () => {
    const data = validate(); if (!data) return;
    ta.value = JSON.stringify(data, null, 2); validate(); toast('Formatted');
  });
  content.querySelector('#json-revert-btn').addEventListener('click', () => {
    if (ta.value !== initialJson && !confirm('Discard your edits?')) return;
    ta.value = initialJson; validate();
  });
  content.querySelector('#json-apply-btn').addEventListener('click', () => {
    const data = validate();
    if (!data) { alert('Fix errors before applying.'); return; }

    // Same merge logic as JSON import — bring in any new sources and remap.
    const have = new Set(state.clips.map(c => c.videoId));
    if (Array.isArray(data.sources)) {
      for (const src of data.sources) {
        const id = src.videoId || extractVideoId(src.url || '');
        if (!id || have.has(id)) continue;
        have.add(id);
        state.clips.push({
          id: nextId++, videoId: id,
          url: src.url || `https://www.youtube.com/watch?v=${id}`,
          title: src.title || id,
          duration: null, player: null,
        });
      }
    }
    const idByVideo = new Map(state.clips.map(c => [c.videoId, c.id]));
    state.timeline = data.clips.map(c => {
      const id = c.videoId || extractVideoId(c.url || '') || extractVideoId(c.file || '');
      if (!id) return null;
      if (!idByVideo.has(id)) {
        const sid = nextId++;
        state.clips.push({ id: sid, videoId: id, url: `https://www.youtube.com/watch?v=${id}`, title: c.title || id, duration: null, player: null });
        idByVideo.set(id, sid);
      }
      return {
        id: nextId++, sourceId: idByVideo.get(id), videoId: id,
        title: c.title || id, start: Number(c.start), end: Number(c.end),
      };
    }).filter(Boolean);

    setStatus(); renderClips(); renderTimeline();
    toast(`Applied ${state.timeline.length} clip${state.timeline.length === 1 ? '' : 's'}`);
    closeModal();
  });

  $('#modal-bg').classList.add('show');
  $('#modal-bg').querySelector('.modal').classList.add('wide');
  validate();
  setTimeout(() => ta.focus(), 50);
}

// ---------- modal ----------
function showModal(title, desc, htmlContent) {
  $('#modal-title').textContent = title;
  $('#modal-desc').textContent = desc || '';
  $('#modal-content').innerHTML = htmlContent || '';
  $('#modal-bg').classList.add('show');
}
function closeModal() {
  $('#modal-bg').classList.remove('show');
  $('#modal-bg').querySelector('.modal').classList.remove('wide');
}
$('#modal-close').addEventListener('click', closeModal);
$('#modal-bg').addEventListener('click', (e) => { if (e.target.id === 'modal-bg') closeModal(); });

// ---------- keyboard shortcuts ----------
// 'i' / 'o' = mark in / out on the source clip whose player is focused.
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key !== 'i' && e.key !== 'o') return;
  // Find the focused/last-clicked card. Heuristic: any card that's the
  // ancestor of document.activeElement, falling back to the first card.
  const card = document.activeElement?.closest?.('.clip-card') || document.querySelector('.clip-card');
  if (!card) return;
  const btn = card.querySelector(e.key === 'i' ? '[data-act=markin]' : '[data-act=markout]');
  btn?.click();
});

renderClips();
renderTimeline();
</script>
</body>
</html>
