<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Download Studio</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161a22;
    --panel-2: #1d2330;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #2997ff;
    --accent-2: #58a6ff;
    --accent-soft: rgba(41, 151, 255, 0.10);
    --good: #3fb950;
    --danger: #f85149;
    --border: #30363d;
    --ease: 0.15s ease;
  }
  * { box-sizing: border-box; }
  :root { --nav-width: 180px; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    font-size: 14px; line-height: 1.5;
    padding-left: var(--nav-width);
    -webkit-font-smoothing: antialiased;
  }

  /* Left navigation rail — kept in sync with the other studios. */
  .nav-rail {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: var(--nav-width);
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    display: flex; flex-direction: column; gap: 2px;
    z-index: 20;
  }
  .nav-rail .nav-brand {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); padding: 0 16px 12px;
    border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .nav-link {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; color: var(--muted); text-decoration: none;
    font-size: 14px; border-left: 3px solid transparent;
    transition: background var(--ease), color var(--ease), border-color var(--ease);
  }
  .nav-link:hover { background: var(--bg); color: var(--text); }
  .nav-link.is-active {
    color: var(--text); background: var(--bg);
    border-left-color: var(--accent);
  }
  .nav-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; flex-shrink: 0;
  }
  .nav-icon svg { width: 18px; height: 18px; display: block; }
  .nav-spacer { flex: 1; }
  .nav-tool {
    background: none; border: none; color: var(--muted);
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; cursor: pointer;
    font: inherit; font-size: 13px; text-align: left;
    border-left: 3px solid transparent;
  }
  .nav-tool:hover { background: var(--bg); color: var(--text); }

  /* Collapsed sidebar — icons only. */
  :root[data-nav="collapsed"] { --nav-width: 56px; }
  body { transition: padding-left 0.18s ease; }
  .nav-rail { transition: width 0.18s ease; }
  [data-nav="collapsed"] .nav-rail { width: 56px; }
  [data-nav="collapsed"] .nav-brand,
  [data-nav="collapsed"] .nav-link .nav-label,
  [data-nav="collapsed"] .nav-tool .nav-label { display: none; }
  [data-nav="collapsed"] .nav-link,
  [data-nav="collapsed"] .nav-tool { justify-content: center; padding: 10px 0; }

  /* Apple-style light theme. */
  :root[data-theme="light"] {
    --bg: #f5f5f7;
    --panel: #ffffff;
    --panel-2: #f5f5f7;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --border: #d2d2d7;
    --accent: #0071e3;
    --accent-2: #4f7ed8;
    --accent-soft: rgba(0, 113, 227, 0.08);
  }
  :root[data-theme="light"] .nav-rail { box-shadow: 0 0 0 1px rgba(0,0,0,0.04); }
  :root[data-theme="light"] header { box-shadow: 0 1px 0 rgba(0,0,0,0.04); }

  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  main { max-width: 760px; margin: 32px auto; padding: 0 24px; }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px;
  }
  h2 { margin: 0 0 8px; font-size: 16px; font-weight: 600; }
  .lead { color: var(--muted); font-size: 13px; margin: 0 0 20px; }

  textarea.url-input {
    width: 100%; min-height: 120px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px; line-height: 1.5;
    resize: vertical;
  }
  textarea.url-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  .opt-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  .opt-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  .opt-grid .row-inline { flex-direction: row; align-items: center; gap: 8px; }
  .opt-grid input[type=number],
  .opt-grid input[type=text] {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 8px; font: inherit; font-size: 13px;
    font-family: ui-monospace, monospace;
  }
  .opt-grid input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  button, .btn {
    font: inherit; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel-2);
    color: var(--text); padding: 6px 12px; border-radius: 6px;
    text-decoration: none; display: inline-block;
    transition: background var(--ease), border-color var(--ease),
                box-shadow var(--ease), filter var(--ease);
  }
  button:hover, .btn:hover { background: var(--panel); border-color: var(--muted); }
  button:focus-visible, .btn:focus-visible {
    outline: none; box-shadow: 0 0 0 3px var(--accent-soft); border-color: var(--accent);
  }
  button.primary {
    background: var(--accent); color: #ffffff; border-color: var(--accent);
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  button.primary:hover { filter: brightness(1.08); box-shadow: 0 2px 5px rgba(0,0,0,0.12); }
  button:disabled, .btn[aria-disabled="true"] { opacity: 0.5; cursor: not-allowed; pointer-events: none; filter: none; box-shadow: none; }

  .actions { margin-top: 18px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .status { font-size: 12px; color: var(--muted); }
  .status.error { color: var(--danger); }
  .status.success { color: var(--good); }

  .result-block {
    margin-top: 20px; padding: 14px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  }
  .result-block .summary { display: flex; align-items: center; gap: 8px; font-weight: 500; margin-bottom: 8px; }
  .result-block .summary .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); }
  .result-block .files { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); }
  .result-block .files code { color: var(--text); }
  .result-block .next-step { margin-top: 12px; display: flex; gap: 8px; }
</style>
</head>
<body>

<script>
  // Restore sidebar + theme preferences before paint to avoid flash.
  (function () {
    const r = document.documentElement;
    if (localStorage.getItem('navMode') === 'collapsed') r.setAttribute('data-nav', 'collapsed');
    if (localStorage.getItem('theme') === 'light') r.setAttribute('data-theme', 'light');
  })();
</script>

<nav class="nav-rail">
  <div class="nav-brand">Studios</div>
  <a href="/" class="nav-link" title="Medley Studio">
    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect width="6" height="11" x="9" y="2" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></span><span class="nav-label">Medley</span>
  </a>
  <a href="/pitch" class="nav-link" title="Pitch Studio">
    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span><span class="nav-label">Pitch</span>
  </a>
  <a href="/download" class="nav-link is-active" title="Download from YouTube">
    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg></span><span class="nav-label">Download</span>
  </a>
  <div class="nav-spacer"></div>
  <button class="nav-tool" id="nav-theme" type="button" title="Toggle theme">
    <span class="nav-icon"></span><span class="nav-label">Dark</span>
  </button>
  <button class="nav-tool" id="nav-collapse" type="button" title="Collapse sidebar">
    <span class="nav-icon"></span><span class="nav-label">Collapse</span>
  </button>
</nav>

<header>
  <h1>Download Studio</h1>
</header>

<main>
<div class="card">
  <h2>Download videos from YouTube</h2>
  <p class="lead">
    Paste one or more YouTube URLs (one per line). Files land in the chosen folder under this project.
    Lines starting with <code>#</code> are ignored.
  </p>

  <textarea id="urls" class="url-input"
    placeholder="One YouTube URL per line — e.g. https://www.youtube.com/watch?v=…"></textarea>

  <div class="opt-grid">
    <label class="row-inline">
      <input type="checkbox" id="audio"> <span>Audio only (mp3)</span>
    </label>
    <label>
      <span>Max video height (px)</span>
      <input type="number" id="quality" value="1080" min="144" step="1">
    </label>
    <label>
      <span>Save to folder</span>
      <input type="text" id="output" value="downloads/main">
    </label>
  </div>

  <div class="actions">
    <button id="run" class="primary">⬇ Download</button>
    <span id="status" class="status"></span>
  </div>

  <div id="result" class="result-block" style="display: none;">
    <div class="summary"><span class="dot"></span><span id="result-title">Downloaded</span></div>
    <div class="files">Saved to <code id="result-folder"></code></div>
    <div class="next-step">
      <a class="btn" href="/" title="Switch to Medley Studio to assemble these clips">↗ Open Medley Studio</a>
    </div>
  </div>
</div>
</main>

<script>
  // ----- sidebar toggles (collapse + theme) -----
  (function () {
    const root = document.documentElement;
    const cBtn = document.getElementById('nav-collapse');
    const tBtn = document.getElementById('nav-theme');
    const ICONS = {
      chevLeft:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
      chevRight: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>',
      moon:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>',
      sun:       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>',
    };
    function syncLabels() {
      const collapsed = root.getAttribute('data-nav') === 'collapsed';
      const light = root.getAttribute('data-theme') === 'light';
      cBtn.querySelector('.nav-icon').innerHTML = collapsed ? ICONS.chevRight : ICONS.chevLeft;
      cBtn.querySelector('.nav-label').textContent = collapsed ? 'Expand' : 'Collapse';
      cBtn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
      tBtn.querySelector('.nav-icon').innerHTML = light ? ICONS.sun : ICONS.moon;
      tBtn.querySelector('.nav-label').textContent = light ? 'Light' : 'Dark';
      tBtn.title = light ? 'Switch to dark theme' : 'Switch to Apple-style light theme';
    }
    cBtn.addEventListener('click', () => {
      if (root.getAttribute('data-nav') === 'collapsed') {
        root.removeAttribute('data-nav'); localStorage.removeItem('navMode');
      } else {
        root.setAttribute('data-nav', 'collapsed'); localStorage.setItem('navMode', 'collapsed');
      }
      syncLabels();
    });
    tBtn.addEventListener('click', () => {
      if (root.getAttribute('data-theme') === 'light') {
        root.removeAttribute('data-theme'); localStorage.removeItem('theme');
      } else {
        root.setAttribute('data-theme', 'light'); localStorage.setItem('theme', 'light');
      }
      syncLabels();
    });
    syncLabels();
  })();

  // ----- download form -----
  const $ = (s) => document.querySelector(s);
  const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));

  const parseUrls = (text) => [...new Set(
    text.split('\n').map(s => s.trim()).filter(s => s && !s.startsWith('#'))
  )];

  $('#run').addEventListener('click', async () => {
    const urls = parseUrls($('#urls').value);
    if (!urls.length) { alert('Paste at least one URL.'); return; }
    const audio = $('#audio').checked;
    const quality = parseInt($('#quality').value, 10) || null;
    const output = $('#output').value.trim() || 'downloads/main';

    const btn = $('#run');
    const status = $('#status');
    const result = $('#result');

    btn.disabled = true;
    btn.textContent = '⏳ Downloading…';
    result.style.display = 'none';
    status.textContent = `Downloading ${urls.length} URL${urls.length === 1 ? '' : 's'}…`;
    status.className = 'status';

    try {
      const res = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls, audio, quality, output }),
      });
      const data = await res.json();
      if (data.ok) {
        status.textContent = '';
        $('#result-title').textContent =
          `Downloaded ${urls.length} ${audio ? 'audio file' : 'video'}${urls.length === 1 ? '' : 's'}`;
        $('#result-folder').textContent = data.output;
        result.style.display = '';
        $('#urls').value = '';
      } else {
        status.innerHTML = `Failed (exit ${data.exit_code}) — see details below`;
        status.className = 'status error';
        // Show the error in a simple block.
        result.style.display = '';
        $('#result-title').textContent = 'Download failed';
        result.querySelector('.dot').style.background = 'var(--danger)';
        $('#result-folder').innerHTML = `<pre style="white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:11px;color:var(--text);">${escapeHtml((data.stderr || data.stdout || '(no output)').trim())}</pre>`;
        result.querySelector('.next-step').style.display = 'none';
      }
    } catch (e) {
      status.textContent = 'Server error: ' + e.message;
      status.className = 'status error';
    } finally {
      btn.disabled = false;
      btn.textContent = '⬇ Download';
    }
  });
</script>

</body>
</html>
